name: PR Preview Link

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  comment-preview-link:
    runs-on: ubuntu-latest
    steps:
      - name: Comment preview link
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const repoFullName = context.payload.pull_request.head.repo.full_name;
            const previewUrl = `https://raw.githack.com/${repoFullName}/${branch}/index.html`;
            const marker = '<!-- pr-preview-link -->';
            const body = `${marker}\n🔍 **Preview this PR:** ${previewUrl}\n\n` +
              `_Powered by raw.githack.com — live from this branch, not cached. ` +
              `Updates automatically on new commits to this PR. Do not use this link in production._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
